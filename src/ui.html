<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GarlicMgr</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box }

    :root {
      --bg: #06060e; --s1: #0c0c1a; --bd: #1a1a35;
      --ac: #0070ff; --ac2: #00bbff; --gl: rgba(0,112,255,.15);
      --tx: #d0d0e4; --dm: #505068;
      --ok: #00dd77; --er: #ff2244; --lb: #040408;
    }

    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: radial-gradient(ellipse at 10% 40%, #0c1424, var(--bg) 65%);
      color: var(--tx); height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    ::-webkit-scrollbar { width: 5px }
    ::-webkit-scrollbar-track { background: transparent }
    ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px }

    /* ── Nav ─────────────────────────────────────────── */
    nav {
      height: 48px; background: var(--s1);
      border-bottom: 1px solid var(--bd);
      display: flex; align-items: center;
      padding: 0 20px; gap: 6px;
      flex-shrink: 0; position: relative;
    }
    nav::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--ac), transparent); opacity: .3;
    }

    .logo {
      font-size: 14px; font-weight: 800; letter-spacing: 3px;
      text-transform: uppercase; margin-right: 20px;
      background: linear-gradient(135deg, var(--ac), var(--ac2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .tab {
      background: none; border: 1px solid transparent; color: var(--dm);
      font-size: 11px; font-weight: 600; padding: 5px 14px;
      cursor: pointer; border-radius: 16px; transition: all .2s;
      letter-spacing: .5px; text-transform: uppercase;
    }
    .tab:hover { color: var(--tx); border-color: var(--bd) }
    .tab.active {
      color: #fff; background: var(--ac); border-color: var(--ac);
      box-shadow: 0 0 12px var(--gl);
    }

    .spacer { flex: 1 }

    .shut {
      background: none; border: 1px solid var(--er); color: var(--er);
      padding: 5px 12px; border-radius: 16px; cursor: pointer;
      font-size: 10px; font-weight: 700;
      letter-spacing: .5px; text-transform: uppercase; transition: all .2s;
    }
    .shut:hover { background: var(--er); color: #fff }

    /* ── Layout ──────────────────────────────────────── */
    .main { flex: 1; display: flex; overflow: hidden }
    .main.full .left { display: none }
    .main.full .right { border-left: none }

    .left {
      width: 300px; min-width: 220px; display: flex; flex-direction: column;
      border-right: 1px solid var(--bd); background: var(--s1);
    }

    .shdr {
      padding: 10px 16px; font-size: 10px; font-weight: 700; color: var(--dm);
      text-transform: uppercase; letter-spacing: 1.5px;
      border-bottom: 1px solid var(--bd); flex-shrink: 0;
    }
    .desk-shdr { display: flex; align-items: center; gap: 0 }

    /* ── Platform tabs ────────────────────────────────── */
    .ptab {
      background: none; border: 1px solid var(--bd); color: var(--dm);
      font-size: 13px; font-weight: 700; padding: 3px 12px;
      cursor: pointer; letter-spacing: .5px; text-transform: uppercase; transition: all .2s;
    }
    .ptab:first-of-type { border-radius: 10px 0 0 10px }
    .ptab:last-of-type { border-radius: 0 10px 10px 0 }
    .ptab.active { color: #fff; background: var(--ac); border-color: var(--ac) }
    .ptab:hover:not(.active) { color: var(--tx) }

    /* ── Save list ───────────────────────────────────── */
    .svs { flex: 1; overflow-y: auto }

    .sv {
      padding: 10px 14px; border-bottom: 1px solid rgba(26,26,53,.5);
      cursor: pointer; transition: all .15s; border-left: 2px solid transparent;
    }
    .sv:hover { background: rgba(255,255,255,.02) }
    .sv.sel {
      background: rgba(0,112,255,.08); border-left-color: var(--ac);
      box-shadow: inset 3px 0 8px -3px var(--gl);
    }
    .sv .tid { font-size: 12px; font-weight: 600; color: var(--tx); letter-spacing: .3px }
    .sv .sn {
      font-size: 11px; color: var(--dm); margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .badge { display:inline-block; font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px; float:right; margin-left:6px }
    .badge-ps4 { background:#1e6fbf; color:#fff }
    .badge-ps5 { background:#1a8a3f; color:#fff }
    .badge-bu { background:#c89b00; color:#000 }
    .badge-usb { background:#8b5cf6; color:#fff }

    /* ── Right panel ─────────────────────────────────── */
    .right { flex: 1; display: flex; flex-direction: column; overflow: hidden }

    .tb {
      padding: 10px 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      border-bottom: 1px solid var(--bd); background: var(--s1);
      flex-shrink: 0; min-height: 40px;
    }

    .btn {
      background: var(--ac); color: #fff; border: none;
      padding: 6px 16px; border-radius: 16px; cursor: pointer;
      font-size: 11px; font-weight: 700; letter-spacing: .4px;
      text-transform: uppercase; transition: all .2s;
    }
    .btn:hover { box-shadow: 0 0 12px var(--gl); filter: brightness(1.1) }
    .btn:disabled { opacity: .25; cursor: not-allowed; box-shadow: none; filter: none }
    .btn.red { background: var(--er) }
    .btn.grn { background: var(--ok); color: #000 }

    /* ── Content area ────────────────────────────────── */
    .ct { flex: 1; overflow-y: auto; display: flex; flex-direction: column }
    .ct.ctr { align-items: center; justify-content: center }

    .drop {
      border: 2px dashed var(--bd); border-radius: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 48px; transition: all .2s; gap: 10px;
      max-width: 380px; width: 90%;
    }
    .drop.over { border-color: var(--ac); background: rgba(0,112,255,.06) }

    .dico { font-size: 32px; opacity: .5 }
    .dlbl { color: var(--dm); font-size: 12px; text-align: center; line-height: 1.6 }
    .dlbl b { color: var(--tx) }

    .bbtn {
      background: var(--ac); color: #fff; border: none;
      padding: 8px 24px; border-radius: 16px; cursor: pointer;
      font-size: 11px; font-weight: 700; letter-spacing: .4px;
      text-transform: uppercase; transition: all .2s; margin-top: 4px;
    }
    .bbtn:hover { box-shadow: 0 0 12px var(--gl); filter: brightness(1.1) }

    .dlnk {
      display: inline-block; padding: 10px 24px;
      background: var(--ok); color: #000; border-radius: 16px;
      text-decoration: none; font-weight: 700; font-size: 12px;
      letter-spacing: .4px; text-transform: uppercase;
      transition: all .2s; margin-top: 8px;
    }
    .dlnk:hover { filter: brightness(1.1); box-shadow: 0 0 12px rgba(0,221,119,.3) }

    /* ── File listing ────────────────────────────────── */
    .fi { padding: 6px 16px; font-size: 14px; color: var(--tx); display: flex; align-items: center }
    .fi.dir { color: var(--ac2); font-weight: 600; cursor: pointer }
    .fi .sz { color: var(--dm); font-size: 12px; margin-left: auto }
    .dir-dots {
      color: var(--dm); font-size: 18px;
      cursor: pointer; padding: 0 4px; margin-left: 6px;
      opacity: .3; transition: opacity .15s; border-radius: 4px;
    }
    .fi.dir:hover .dir-dots { opacity: .7 }
    .dir-dots:hover { opacity: 1 !important; color: var(--tx); background: rgba(255,255,255,.05) }
    .title-dots {
      color: var(--dm); font-size: 18px;
      cursor: pointer; padding: 0 4px; margin-left: 6px;
      opacity: .3; transition: opacity .15s; border-radius: 4px;
    }
    .sv:hover .title-dots { opacity: .7 }
    .title-dots:hover { opacity: 1 !important; color: var(--tx); background: rgba(255,255,255,.05) }

    .empty { padding: 40px; text-align: center; color: var(--dm); font-size: 12px; letter-spacing: .3px }
    .dh { padding: 16px; text-align: center; color: var(--dm); font-size: 11px; opacity: .4; margin-top: auto }

    /* ── Log panel ───────────────────────────────────── */
    .logw {
      height: 150px; border-top: 1px solid var(--bd);
      display: flex; flex-direction: column;
      flex-shrink: 0; background: var(--lb); position: relative;
    }
    .logw::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,20,10,.04) 2px, rgba(0,20,10,.04) 4px);
      pointer-events: none; z-index: 1;
    }

    .log {
      flex: 1; overflow-y: auto; padding: 6px 14px;
      font-family: 'SF Mono', Consolas, monospace; font-size: 11px; line-height: 1.7;
    }

    .ll { color: #4a6a5a; animation: fadeIn .2s ease }
    .ll.err { color: var(--er) }
    .ll.ok { color: var(--ok) }
    .ll .t { opacity: .35; margin-right: 8px }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(2px) }
      to { opacity: 1; transform: none }
    }

    /* ── Modal ───────────────────────────────────────── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--s1); border: 1px solid var(--bd); border-radius: 12px;
      padding: 24px; max-width: 380px; width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .modal h3 { font-size: 14px; color: var(--tx); margin-bottom: 8px }
    .modal p { font-size: 12px; color: var(--dm); margin-bottom: 20px; word-break: break-all }
    .modal .btns { display: flex; gap: 8px; justify-content: flex-end }
    .modal .btns button {
      padding: 8px 20px; border: none; border-radius: 16px;
      font-size: 11px; font-weight: 700; letter-spacing: .4px;
      text-transform: uppercase; cursor: pointer; transition: all .2s;
    }
    .modal .mbtn-r { background: var(--er); color: #fff }
    .modal .mbtn-r:hover { filter: brightness(1.2) }
    .modal .mbtn-s { background: var(--bd); color: var(--tx) }
    .modal .mbtn-s:hover { background: var(--dm) }

    /* ── Hex/Text editor ─────────────────────────────── */
    .editor-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; background: var(--s1);
      border-bottom: 1px solid var(--bd); flex-shrink: 0;
    }
    .editor-bar .ebtn {
      background: none; border: 1px solid var(--bd); color: var(--dm);
      font-size: 11px; font-weight: 600; padding: 4px 14px;
      cursor: pointer; border-radius: 12px; transition: all .2s;
      letter-spacing: .4px; text-transform: uppercase;
    }
    .editor-bar .ebtn:hover { color: var(--tx); border-color: var(--tx) }
    .editor-bar .ebtn.eact { color: #fff; background: var(--ac); border-color: var(--ac) }
    .editor-bar .ename {
      font-size: 12px; color: var(--tx); font-weight: 600;
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .editor-bar .esz { font-size: 11px; color: var(--dm); margin-left: auto }

    .hex-wrap {
      flex: 1; overflow: auto; font-family: 'SF Mono', Consolas, monospace;
      font-size: 14px; line-height: 1.6; padding: 8px 0;
    }
    .hex-row {
      display: flex; padding: 0 16px; white-space: pre;
    }
    .hex-row:hover { background: rgba(255,255,255,.02) }
    .hex-off { color: var(--dm); width: 80px; flex-shrink: 0; user-select: none }
    .hex-bytes { flex-shrink: 0 }
    .hex-bytes span { cursor: pointer; padding: 0 1px; border-radius: 2px }
    .hex-bytes span:hover { background: rgba(0,112,255,.2) }
    .hex-bytes span.dirty { color: var(--ok); font-weight: 700 }
    .hex-sep { width: 12px; flex-shrink: 0 }
    .hex-ascii { color: var(--ac2); flex-shrink: 0; flex: 1 }
    .hex-ascii span { cursor: pointer; border-radius: 2px }
    .hex-ascii span:hover { background: rgba(0,187,255,.15) }
    .hex-ascii span.dirty { color: var(--ok); font-weight: 700 }

    .hex-edit-input {
      background: var(--ac); color: #fff; border: none;
      font-family: inherit; font-size: inherit; font-weight: 700;
      width: 20px; text-align: center; padding: 0; border-radius: 2px;
      outline: none;
    }

    .text-wrap {
      flex: 1; position: relative; overflow: hidden;
    }
    .text-wrap textarea, .text-wrap pre {
      position: absolute; inset: 0; width: 100%; height: 100%;
      margin: 0; padding: 12px 16px;
      font-family: 'SF Mono', Consolas, monospace; font-size: 13px;
      line-height: 1.6; tab-size: 4; white-space: pre-wrap; word-wrap: break-word;
      border: none; resize: none; outline: none;
      overflow: auto; -webkit-overflow-scrolling: touch;
    }
    .text-wrap textarea {
      background: transparent; color: transparent; caret-color: var(--tx);
      z-index: 2;
    }
    .text-wrap pre {
      background: var(--bg); color: var(--tx);
      z-index: 1; pointer-events: none;
    }
    /* syntax colors */
    .hl-key { color: #7cb8ff }
    .hl-str { color: #a5d6ff }
    .hl-num { color: #79c0ff }
    .hl-bool { color: #ff7b72 }
    .hl-null { color: #ff7b72; font-style: italic }
    .hl-tag { color: #7ee787 }
    .hl-attr { color: #d2a8ff }
    .hl-aval { color: #a5d6ff }
    .hl-cmt { color: #505068; font-style: italic }

    /* ── Context menu ────────────────────────────────── */
    .ctx-menu {
      position: fixed; background: var(--s1); border: 1px solid var(--bd);
      border-radius: 8px; padding: 4px 0; min-width: 140px;
      box-shadow: 0 4px 16px rgba(0,0,0,.5); z-index: 200;
    }
    .ctx-menu div {
      padding: 7px 14px; font-size: 12px; cursor: pointer;
      transition: background .1s;
    }
    .ctx-menu div:hover { background: rgba(255,255,255,.05) }
    .ctx-menu .ctx-del { color: var(--er) }

    /* ── Options dropdown ────────────────────────────── */
    .opts-menu {
      display: none; position: absolute; top: 100%; right: 0;
      background: var(--s1); border: 1px solid var(--bd);
      border-radius: 8px; padding: 4px 0; min-width: 200px;
      box-shadow: 0 4px 16px rgba(0,0,0,.5); z-index: 200;
      margin-top: 4px;
    }
    .opts-menu.open { display: block }
    .mob-opts { display: none; position: relative }
    .opts-menu div {
      padding: 9px 16px; font-size: 12px; cursor: pointer;
      transition: background .1s; white-space: nowrap;
    }
    .opts-menu div:hover { background: rgba(255,255,255,.05) }

    /* ── Progress bar ────────────────────────────────── */
    .prog {
      width: 100%; height: 4px; background: var(--bd);
      border-radius: 2px; margin-top: 8px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; background: var(--ac); border-radius: 2px;
      transition: width .15s; width: 0%;
    }
    .prog-text {
      font-size: 11px; color: var(--dm); margin-top: 6px;
      font-family: 'SF Mono', Consolas, monospace;
    }

    /* ── Hamburger button (mobile only) ─────────────── */
    .hamburger {
      display: none; background: none; border: 1px solid var(--bd);
      color: var(--tx); padding: 6px 8px; border-radius: 6px;
      cursor: pointer; font-size: 18px; line-height: 1;
    }

    /* ── Mobile menu overlay ────────────────────────── */
    .mob-menu {
      display: none; position: fixed; top: 48px; left: 0; right: 0;
      background: var(--s1); border-bottom: 1px solid var(--bd);
      z-index: 50; flex-direction: column; padding: 8px 0;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
    }
    .mob-menu.open { display: flex }
    .mob-menu .tab {
      border-radius: 0; padding: 12px 20px; text-align: left;
      font-size: 13px; border: none;
    }
    .mob-menu .tab.active { border-radius: 0 }
    .mob-menu .shut {
      margin: 8px 16px; text-align: center;
    }

    /* ── Drawer toggle (mobile browse) ──────────────── */
    .drawer-toggle {
      display: none; padding: 10px 16px; background: var(--s1);
      border-bottom: 1px solid var(--bd); cursor: pointer;
      font-size: 11px; font-weight: 700; color: var(--dm);
      text-transform: uppercase; letter-spacing: 1px;
      flex-shrink: 0;
    }
    .drawer-toggle:hover { color: var(--tx) }

    /* ── Mobile ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .hamburger { display: block }
      nav .tab, nav .shut { display: none }

      .main { flex-direction: column }
      .main .left {
        width: 100%; min-width: 0; border-right: none;
        border-bottom: 1px solid var(--bd);
        max-height: 50vh; flex-shrink: 0;
      }
      .main .left.collapsed .svs { display: none }
      .main .left.collapsed { max-height: none }
      .main.full .left { display: none }

      .drawer-toggle { display: block }
      .desk-shdr { display: none !important }

      .desk-btn { display: none !important }
      .mob-opts { display: inline-block !important }
      .tb { gap: 6px; padding: 8px 10px }
      .tb .btn { font-size: 10px; padding: 5px 10px }
      .tb img { width: 60px !important; height: 34px !important }

      .drop { padding: 24px 20px; max-width: 100%; width: 95% }

      .logw { height: 100px }

      .fi { font-size: 12px; padding: 6px 10px }
      .dir-dots { opacity: .5 }
    }

    /* ── User selector ────────────────────────────────── */
    .user-sel {
      position: relative; display: inline-flex; align-items: center;
      margin-right: 12px;
    }
    .user-btn {
      background: none; border: 1px solid var(--bd); color: var(--tx);
      font-size: 11px; font-weight: 600; padding: 4px 10px;
      cursor: pointer; border-radius: 12px; transition: all .2s;
      display: flex; align-items: center; gap: 4px;
    }
    .user-btn:hover { border-color: var(--ac); color: var(--ac) }
    .user-btn .arrow { font-size: 8px; color: var(--dm) }
    .user-dd {
      display: none; position: absolute; top: 100%; left: 0; margin-top: 4px;
      background: var(--s1); border: 1px solid var(--bd); border-radius: 8px;
      min-width: 140px; z-index: 100; overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
    }
    .user-dd.open { display: block }
    .user-dd div {
      padding: 8px 12px; font-size: 11px; cursor: pointer; transition: background .1s;
    }
    .user-dd div:hover { background: var(--gl) }
    .user-dd div.active { color: var(--ac); font-weight: 700 }
  </style>
</head>
<body>

<!-- ── Navigation ──────────────────────────────────── -->
<nav>
  <span class="logo">GARLICMGR</span>
  <div class="user-sel" id="usersel">
    <button class="user-btn" onclick="toggleUserDD()"><span id="curuser">Loading...</span> <span class="arrow">&#9662;</span></button>
    <div class="user-dd" id="userdd"></div>
  </div>
  <button class="tab active" onclick="switchTab('browse')">Browse</button>
  <button class="tab" onclick="switchTab('decrypt')">Decrypt</button>
  <button class="tab" onclick="switchTab('encrypt')">Encrypt</button>
  <button class="tab" onclick="switchTab('resign')">Resign</button>
  <button class="tab" onclick="switchTab('import')">Import</button>
  <span class="spacer"></span>
  <button class="shut" onclick="shutdown()">Kill GarlicMgr</button>
  <button class="hamburger" onclick="toggleMenu()">&#9776;</button>
</nav>
<div class="mob-menu" id="mobmenu">
  <button class="tab active" onclick="switchTab('browse')">Browse</button>
  <button class="tab" onclick="switchTab('decrypt')">Decrypt</button>
  <button class="tab" onclick="switchTab('encrypt')">Encrypt</button>
  <button class="tab" onclick="switchTab('resign')">Resign</button>
  <button class="tab" onclick="switchTab('import')">Import</button>
  <button class="shut" onclick="shutdown()">Kill GarlicMgr</button>
</div>

<!-- ── Main layout ─────────────────────────────────── -->
<div class="main" id="mn">
  <div class="left" id="drawer">
    <div class="shdr desk-shdr">
      <span style="margin-right:auto">Saves</span>
      <button class="ptab active" id="ptab5" onclick="setPlatform('ps5')">PS5</button>
      <button class="ptab" id="ptab4" onclick="setPlatform('ps4')">PS4</button>
    </div>
    <div class="drawer-toggle" onclick="toggleDrawer()" id="dtog"></div>
    <div class="svs" id="svs"><div class="empty">Loading...</div></div>
  </div>
  <div class="right">
    <div class="tb" id="tb"></div>
    <div class="ct" id="ct"></div>
  </div>
</div>

<!-- ── Log panel ───────────────────────────────────── -->
<div class="logw">
  <div class="shdr">Terminal</div>
  <div class="log" id="log"></div>
</div>

<script>
/* ── State ─────────────────────────────────────────── */
let S = [], si = -1, tab = 'browse';
let mt = false, bsy = false;
let cf = [], ex = new Set();
let aid = '', stitle = '', mtid = '', mpt = '';

/* ── Utilities ─────────────────────────────────────── */
function $(id) { return document.getElementById(id) }

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function log(m, c) {
  const d = $('log'), t = new Date().toLocaleTimeString();
  d.innerHTML += '<div class="ll' + (c ? ' ' + c : '') + '">'
    + '<span class="t">' + t + '</span>' + esc(m) + '</div>';
  d.scrollTop = d.scrollHeight;
}

function fmtB(b) {
  if (b < 1024) return b + 'B';
  if (b < 1048576) return (b / 1024).toFixed(1) + 'K';
  return (b / 1048576).toFixed(1) + 'M';
}

/* ── XHR upload with progress ──────────────────────── */
function upload(url, file, onProgress, respType) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', url);
    xhr.setRequestHeader('Content-Type', 'application/octet-stream');
    if (respType) xhr.responseType = respType;
    xhr.timeout = 300000; /* 5 min timeout for large saves */
    xhr.upload.onprogress = e => {
      if (e.lengthComputable && onProgress) onProgress(e.loaded, e.total);
    };
    xhr.onload = () => resolve(xhr);
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.ontimeout = () => reject(new Error('Timeout'));
    xhr.send(file);
  });
}

function showProgress(pct, loaded, total) {
  let el = document.getElementById('upprog');
  if (!el) {
    const ct = $('ct');
    const drop = ct.querySelector('.drop');
    if (!drop) return;
    el = document.createElement('div');
    el.id = 'upprog';
    el.innerHTML = '<div class="prog"><div class="prog-fill"></div></div><div class="prog-text"></div>';
    drop.appendChild(el);
  }
  el.querySelector('.prog-fill').style.width = pct + '%';
  el.querySelector('.prog-text').textContent = fmtB(loaded) + ' / ' + fmtB(total) + ' (' + pct + '%)';
}

/* ── Drag & drop zone setup ────────────────────────── */
function setupDZ(id, fn) {
  const el = $(id);
  if (!el) return;
  el.ondragover = e => { e.preventDefault(); el.classList.add('over') };
  el.ondragleave = e => { e.preventDefault(); el.classList.remove('over') };
  el.ondrop = e => {
    e.preventDefault(); el.classList.remove('over');
    if (e.dataTransfer.files.length) fn(e.dataTransfer.files);
  };
  const b = el.querySelector('.bbtn');
  if (b) b.onclick = e => {
    e.stopPropagation();
    const i = document.createElement('input');
    i.type = 'file'; i.multiple = true;
    i.onchange = () => { if (i.files.length) fn(i.files) };
    i.click();
  };
}

/* ── Folder drag & drop zone setup ────────────────── */
function setupFolderDZ(id, fn) {
  const el = $(id);
  if (!el) return;
  el.ondragover = e => { e.preventDefault(); el.classList.add('over') };
  el.ondragleave = e => { e.preventDefault(); el.classList.remove('over') };
  el.ondrop = async e => {
    e.preventDefault(); el.classList.remove('over');
    const items = e.dataTransfer.items;
    if (!items || !items.length) return;
    const files = [];
    const entries = [];
    for (let i = 0; i < items.length; i++) {
      const entry = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
      if (entry) entries.push(entry);
    }
    if (entries.length && entries[0].isDirectory) {
      const all = await readEntryRecursive(entries[0], '');
      if (all.length) fn(all, entries[0].name);
    } else if (e.dataTransfer.files.length) {
      fn(Array.from(e.dataTransfer.files));
    }
  };
  const b = el.querySelector('.bbtn');
  if (b) b.onclick = e => {
    e.stopPropagation();
    const i = document.createElement('input');
    i.type = 'file'; i.webkitdirectory = true;
    i.onchange = () => {
      if (i.files.length) {
        const prefix = i.files[0].webkitRelativePath.split('/')[0];
        fn(Array.from(i.files), prefix);
      }
    };
    i.click();
  };
}

/* ── Recursively read folder entries ──────────────── */
function readEntryRecursive(entry, basePath) {
  return new Promise(resolve => {
    if (entry.isFile) {
      entry.file(f => {
        f._path = basePath + f.name;
        resolve([f]);
      });
    } else if (entry.isDirectory) {
      const reader = entry.createReader();
      const all = [];
      const readBatch = () => {
        reader.readEntries(entries => {
          if (!entries.length) {
            Promise.all(all).then(arrs => resolve(arrs.flat()));
            return;
          }
          for (const e of entries) {
            all.push(readEntryRecursive(e, basePath + entry.name + '/'));
          }
          readBatch();
        });
      };
      readBatch();
    } else {
      resolve([]);
    }
  });
}

/* ── Decrypt drop ──────────────────────────────────── */
async function decDrop(files) {
  if (bsy || !files.length) return;
  /* Check first byte to detect PS4 (0x01) vs PS5 (0x02) */
  const imgFile = files[0];
  const hdr = new Uint8Array(await imgFile.slice(0, 1).arrayBuffer());
  const isPS4 = (hdr[0] === 0x01);

  let binFile = null;
  if (isPS4) {
    /* Look for .bin in the dropped files */
    for (let i = 1; i < files.length; i++) {
      if (files[i].name.endsWith('.bin')) { binFile = files[i]; break; }
    }
    if (!binFile) {
      log('PS4 save detected — please drop both the save image and its .bin sealed key file together', 'err');
      return;
    }
  }

  bsy = true;
  $('ct').innerHTML = '<div class="drop"><div class="dlbl">Uploading for decrypt...</div></div>';
  try {
    /* For PS4, upload .bin key first */
    if (isPS4 && binFile) {
      log('Uploading PS4 sealed key ' + binFile.name + '...');
      const kxhr = await upload('/api/upload_key', binFile);
      if (kxhr.status !== 200) throw new Error('Failed to upload .bin key');
    }
    log('Uploading ' + imgFile.name + ' (' + fmtB(imgFile.size) + ')...');
    const xhr = await upload('/api/decrypt_upload' + (isPS4 ? '?ps4=1' : ''), imgFile, (loaded, total) => {
      const pct = Math.round(loaded * 100 / total);
      showProgress(pct, loaded, total);
    });
    if (xhr.status !== 200) {
      const d = JSON.parse(xhr.responseText);
      throw new Error(d.error || 'Failed');
    }
    log('Mounted — click Download to save decrypted files', 'ok');
    const name = imgFile.name.replace(/\.[^.]+$/, '') + '_dec.zip';
    $('ct').innerHTML =
      '<div class="drop"><div class="dlbl">Decrypted successfully!</div>'
      + '<a class="dlnk" href="/api/download" download="' + esc(name) + '">Download .zip</a>'
      + '<br><button class="bbtn" style="margin-top:12px" onclick="fetch(\'/api/unmount\');renderCt()">Done</button></div>';
  } catch (e) {
    log('Error: ' + e.message, 'err');
    renderCt();
  }
  bsy = false;
}

/* ── Encrypt drop ──────────────────────────────────── */
async function encDrop(files, folderName) {
  if (bsy || !files || !files.length) return;
  const aidv = document.getElementById('eaid') ? document.getElementById('eaid').value.trim() : '';
  const isPS4 = document.getElementById('eps4') ? document.getElementById('eps4').checked : false;
  bsy = true;

  try {
    /* Calculate total size for PFS image sizing */
    let totalSize = 0;
    for (const f of files) totalSize += f.size;

    /* Step 1: create fresh PFS image and mount it */
    log('Creating ' + (isPS4 ? 'PS4' : 'PS5') + ' PFS image (' + fmtB(totalSize) + ' of files)...');
    $('ct').innerHTML = '<div class="drop"><div class="dlbl">Creating PFS image...</div></div>';
    let r = await fetch('/api/create_pfs?size=' + totalSize + (isPS4 ? '&ps4=1' : ''));
    let d = await r.json();
    if (d.error) throw new Error(d.error);
    log('PFS image created and mounted', 'ok');

    /* Step 2: upload each file */
    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      const path = f._path || f.webkitRelativePath || f.name;
      /* Strip leading folder name */
      const parts = path.split('/');
      const relPath = parts.length > 1 ? parts.slice(1).join('/') : parts[0];

      log('Uploading (' + (i + 1) + '/' + files.length + ') ' + relPath + ' (' + fmtB(f.size) + ')...');
      $('ct').innerHTML = '<div class="drop" id="dz"><div class="dlbl">Uploading ' + esc(relPath)
        + '<br>(' + (i + 1) + '/' + files.length + ')</div></div>';

      const xhr = await upload('/api/upload_file?name=' + encodeURIComponent(relPath), f, (loaded, total) => {
        const pct = Math.round(loaded * 100 / total);
        showProgress(pct, loaded, total);
      });
      const rd = JSON.parse(xhr.responseText);
      if (!rd.ok) throw new Error(rd.error || 'Upload failed for ' + relPath);
    }
    log('All ' + files.length + ' files uploaded', 'ok');

    /* Step 3: patch AID if provided, unmount, download encrypted */
    log('Encrypting and downloading...');
    $('ct').innerHTML = '<div class="drop"><div class="dlbl">Encrypting save...</div></div>';
    const name = (folderName || 'encrypted_save') + '_enc';

/* ── Resign drop ───────────────────────────────────── */
async function resignDrop(files) {
  if (bsy || !files.length) return;
  const aidv = document.getElementById('raid').value.trim();
  if (!aidv) { log('Enter new Account ID first', 'err'); return }

  /* Find image file (largest non-.bin) and detect PS4 */
  let imgFile = null, binFile = null;
  for (let i = 0; i < files.length; i++) {
    if (files[i].name.endsWith('.bin')) binFile = files[i];
    else if (!imgFile || files[i].size > imgFile.size) imgFile = files[i];
  }
  if (!imgFile) return;

  const hdr = new Uint8Array(await imgFile.slice(0, 1).arrayBuffer());
  const isPS4 = (hdr[0] === 0x01);

  if (isPS4 && !binFile) {
    log('PS4 save detected — please drop both the save image and its .bin sealed key file together', 'err');
    return;
  }

  bsy = true;
  $('ct').innerHTML = '<div class="drop"><div class="dlbl">Uploading for resign...</div></div>';
  try {
    /* For PS4, upload .bin key first */
    if (isPS4 && binFile) {
      log('Uploading PS4 sealed key ' + binFile.name + '...');
      const kxhr = await upload('/api/upload_key', binFile);
      if (kxhr.status !== 200) throw new Error('Failed to upload .bin key');
    }

    const uidv = document.getElementById('ruid') ? document.getElementById('ruid').value.trim() : '';
    log('Uploading ' + imgFile.name + ' (' + fmtB(imgFile.size) + ') for resign...');
    let rurl = '/api/resign?aid=' + encodeURIComponent(aidv);
    if (isPS4) rurl += '&ps4=1';
    if (uidv) rurl += '&uid=' + encodeURIComponent(uidv);
    const xhr = await upload(rurl, imgFile, (loaded, total) => {
      const pct = Math.round(loaded * 100 / total);
      showProgress(pct, loaded, total);
    });
    const d = JSON.parse(xhr.responseText);
    if (d.error) throw new Error(d.error);
    log('Resigned ' + fmtB(d.size) + ', starting download...', 'ok');
    const name = imgFile.name.replace(/\.[^.]+$/, '') + '_resigned';
    const a = document.createElement('a');
    a.href = '/api/resign_download?name=' + encodeURIComponent(name) + (isPS4 ? '&ps4=1' : '');
    a.download = isPS4 ? (name + '.zip') : name;
    document.body.appendChild(a); a.click(); a.remove();
    $('ct').innerHTML =
      '<div class="drop"><div class="dlbl">' + esc(name) + '<br>' + fmtB(d.size) + '</div>'
      + '<div style="color:#0f0">Download started' + (isPS4 ? ' (.zip)' : '') + '</div>'
      + '<button class="bbtn" style="margin-top:12px" onclick="switchTab(\'resign\')">Resign Another</button></div>';
  } catch (e) {
    log('Error: ' + e.message, 'err');
    renderCt();
  }
  bsy = false;
}

/* ── Import drop ───────────────────────────────────── */
async function importDrop(files, folderName) {
  if (bsy || !files || !files.length) return;

  /* Check for sce_sys/param.sfo in the dropped files */
  let hasSfo = false;
  for (const f of files) {
    const p = f._path || f.webkitRelativePath || f.name;
    if (p.match(/sce_sys\/param\.sfo$/i)) { hasSfo = true; break; }
  }
  if (!hasSfo) {
    log('Folder must contain sce_sys/param.sfo', 'err');
    return;
  }

  bsy = true;
  try {
    /* Calculate total size */
    let totalSize = 0;
    for (const f of files) totalSize += f.size;

    /* Step 1: create PFS image */
    log('Creating PFS image for import (' + fmtB(totalSize) + ' of files)...');
    $('ct').innerHTML = '<div class="drop"><div class="dlbl">Creating PFS image...</div></div>';
    let r = await fetch('/api/create_pfs?size=' + totalSize);
    let d = await r.json();
    if (d.error) throw new Error(d.error);
    log('PFS image created and mounted', 'ok');

    /* Step 2: upload each file */
    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      const path = f._path || f.webkitRelativePath || f.name;
      const parts = path.split('/');
      const relPath = parts.length > 1 ? parts.slice(1).join('/') : parts[0];

      log('Uploading (' + (i + 1) + '/' + files.length + ') ' + relPath + ' (' + fmtB(f.size) + ')...');
      $('ct').innerHTML = '<div class="drop" id="dz"><div class="dlbl">Uploading ' + esc(relPath)
        + '<br>(' + (i + 1) + '/' + files.length + ')</div></div>';

      const xhr = await upload('/api/upload_file?name=' + encodeURIComponent(relPath), f, (loaded, total) => {
        const pct = Math.round(loaded * 100 / total);
        showProgress(pct, loaded, total);
      });
      const rd = JSON.parse(xhr.responseText);
      if (!rd.ok) throw new Error(rd.error || 'Upload failed for ' + relPath);
    }
    log('All ' + files.length + ' files uploaded', 'ok');

    /* Check if save already exists */
    r = await fetch('/api/import_check?uid=' + encodeURIComponent(curUid));
    d = await r.json();
    if (d.exists) {
      const ok = await showConfirmModal('This will overwrite an existing save. Are you sure?');
      if (!ok) {
        log('Import cancelled');
        try { await fetch('/api/unmount'); } catch(x) {}
        renderCt(); bsy = false; return;
      }
    }

    /* Step 3: finalize import (resign, unmount, copy to system, update DB) */
    await doImportFinish();

  } catch (e) {
    log('Import error: ' + e.message, 'err');
    /* Try to clean up by unmounting */
    try { await fetch('/api/unmount'); } catch(x) {}
    renderCt();
  }
  bsy = false;
}

}

/* ── Import DZ setup (accepts both folders and files) ── */
function setupImportDZ(id) {
  const el = $(id);
  if (!el) return;
  el.ondragover = e => { e.preventDefault(); el.classList.add('over') };
  el.ondragleave = e => { e.preventDefault(); el.classList.remove('over') };
  el.ondrop = async e => {
    e.preventDefault(); el.classList.remove('over');
    const items = e.dataTransfer.items;
    const entries = [];
    if (items) {
      for (let i = 0; i < items.length; i++) {
        const entry = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
        if (entry) entries.push(entry);
      }
    }
    if (entries.length && entries[0].isDirectory) {
      const all = await readEntryRecursive(entries[0], '');
      if (all.length) importDrop(all, entries[0].name);
    } else {
      importEncrypted(e.dataTransfer.files);
    }
  };
}

/* ── Import encrypted save ─────────────────────────── */
async function importEncrypted(files) {
  if (bsy || !files.length) return;

  /* Find image file (largest non-.bin) and detect PS4 */
  let imgFile = null, binFile = null;
  for (let i = 0; i < files.length; i++) {
    if (files[i].name.endsWith('.bin')) binFile = files[i];
    else if (!imgFile || files[i].size > imgFile.size) imgFile = files[i];
  }
  if (!imgFile) { log('No save file found', 'err'); return; }

  const hdr = new Uint8Array(await imgFile.slice(0, 1).arrayBuffer());
  const isPS4 = (hdr[0] === 0x01);

  if (isPS4 && !binFile) {
    log('PS4 save detected — drop both the save image and .bin key together', 'err');
    return;
  }

  bsy = true;
  $('ct').innerHTML = '<div class="drop"><div class="dlbl">Uploading encrypted save...</div></div>';
  try {
    /* Upload .bin key first if PS4 */
    if (isPS4 && binFile) {
      log('Uploading PS4 sealed key ' + binFile.name + '...');
      const kxhr = await upload('/api/upload_key', binFile);
      if (kxhr.status !== 200) throw new Error('Failed to upload .bin key');
    }

    log('Uploading ' + imgFile.name + ' (' + fmtB(imgFile.size) + ')...');
    const xhr = await upload('/api/import_encrypted?uid=' + encodeURIComponent(curUid) + (isPS4 ? '&ps4=1' : ''), imgFile, (loaded, total) => {
      showProgress(Math.round(loaded * 100 / total), loaded, total);
    });
    const d = JSON.parse(xhr.responseText);
    if (d.error) throw new Error(d.error);

    log('Save verified: ' + d.title_id + ' / ' + d.dir_name, 'ok');

    /* Check if save already exists */
    if (d.exists) {
      const ok = await showConfirmModal('This will overwrite an existing save. Are you sure?');
      if (!ok) {
        log('Import cancelled');
        try { await fetch('/api/unmount'); } catch(x) {}
        renderCt(); bsy = false; return;
      }
    }

    if (d.match) {
      /* Account ID matches — proceed to import */
      await doImportFinish();
    } else {
      /* Account ID mismatch — show modal */
      const resign = await showConfirmModal(
        'Account ID Mismatch!<br><br>'
        + '<span style="font-size:13px;color:var(--dm)">'
        + 'Save: <b style="color:var(--tx)">' + esc(d.save_aid) + '</b><br>'
        + 'Your account: <b style="color:var(--tx)">' + esc(d.user_aid) + '</b></span><br><br>'
        + 'Do you want to resign to your account ID?',
        'Yes, Resign', 'Cancel');
      if (resign) {
        await doImportFinish();
      } else {
        log('Import cancelled');
        try { await fetch('/api/unmount'); } catch(x) {}
        renderCt();
      }
    }
  } catch (e) {
    log('Import error: ' + e.message, 'err');
    try { await fetch('/api/unmount'); } catch(x) {}
    renderCt();
  }
  bsy = false;
}

/* ── Render file tree ──────────────────────────────── */
function renderF() {
  $('ct').className = 'ct';
  const isUsb = si >= 0 && S[si] && S[si].usb;
  let h = '';
  cf.forEach((f, i) => {
    const ps = f.name.split('/');
    ps.pop();
    let pp = '', vis = true;
    for (let j = 0; j < ps.length; j++) {
      pp = j ? pp + '/' + ps[j] : ps[j];
      if (!ex.has(pp)) { vis = false; break }
    }
    if (!vis) return;
    const d = f.name.split('/').length - 1;
    const nm = f.name.split('/').pop();
    if (f.dir) {
      const o = ex.has(f.name);
      const fn = esc(f.name).replace(/'/g, "\\'");
      h += '<div class="fi dir" style="padding-left:' + (16 + d * 16) + 'px" onclick="tog(' + i + ')">';
      h += (o ? '\u25BE \u{1F4C1} ' : '\u25B8 \u{1F4C1} ') + esc(nm);
      if (!isUsb) h += '<span class="dir-dots" onclick="event.stopPropagation();showDirMenu(event,\'' + fn + '\')">\u22EE</span>';
      h += '</div>';
    } else {
      const fn = esc(f.name).replace(/'/g, "\\'");
      const clickAttr = ' onclick="openEditor(\'' + fn + '\',' + f.size + ')" style="cursor:pointer;padding-left:' + (16 + d * 16) + 'px"';
      if (isUsb) {
        h += '<div class="fi"' + clickAttr + '>';
      } else {
        h += '<div class="fi"' + clickAttr + ' oncontextmenu="showCtxMenu(event,\'' + fn + '\')">';
      }
      h += '\u{1F4C4} ' + esc(nm) + '<span class="sz">' + fmtB(f.size) + '</span></div>';
    }
  });
  if (!isUsb) h += '<div class="dh" style="opacity:1;font-size:12px">Tip: Drag & drop files here to add or replace them</div>';
  $('ct').innerHTML = h || '<div class="empty">Empty</div>';
  if (!isUsb) {
    $('ct').oncontextmenu = e => {
      if (!e.target.closest('.fi:not(.dir)')) { e.preventDefault(); showCtxMenu(e, null); }
    };
    setupDZ('ct', handleBrw);
  }
}

/* ── Hex / Text Editor ────────────────────────────── */
let edName = '';           /* file path relative to mount */
let edTotal = 0;           /* total file size */
let edMode = 'hex';        /* 'hex' or 'text' */
let edCache = {};          /* offset -> Uint8Array chunk cache */
let edEdits = {};          /* offset -> byte value (user edits) */
let edRowH = 22;           /* row height in px */
let edFontSize = 14;      /* hex editor font size */
let edPending = {};        /* in-flight fetch promises by chunk offset */
const ED_CHUNK = 4096;     /* bytes per fetch chunk (4KB) */
const ED_TEXT_MAX = 2 * 1024 * 1024; /* max file size for text mode (2MB) */

async function openEditor(name, size) {
  if (bsy) return;
  edName = name;
  edTotal = size;
  edMode = 'hex';
  edCache = {};
  edEdits = {};
  edPending = {};
  renderEditorShell();
  /* Prefetch first chunk */
  await edFetchChunk(0);
  edRenderRows();
  log('Opened ' + name + ' (' + fmtB(size) + ')', 'ok');
}

function edFetchChunk(chunkOff) {
  if (edCache[chunkOff] || edPending[chunkOff]) return edPending[chunkOff] || Promise.resolve();
  edPending[chunkOff] = fetch('/api/read_file?name=' + encodeURIComponent(edName)
    + '&offset=' + chunkOff + '&length=' + ED_CHUNK)
    .then(r => r.json()).then(d => {
      if (d.data) {
        const bin = atob(d.data);
        const arr = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
        edCache[chunkOff] = arr;
      }
      delete edPending[chunkOff];
    }).catch(() => { delete edPending[chunkOff]; });
  return edPending[chunkOff];
}

function edGetByte(off) {
  if (off in edEdits) return { v: edEdits[off], dirty: true };
  const cOff = Math.floor(off / ED_CHUNK) * ED_CHUNK;
  const chunk = edCache[cOff];
  if (!chunk) return null;
  const idx = off - cOff;
  if (idx >= chunk.length) return null;
  return { v: chunk[idx], dirty: false };
}

function edZoom(dir) {
  edFontSize = Math.max(10, Math.min(24, edFontSize + dir));
  edRowH = Math.round(edFontSize * 1.6);
  renderEditorShell();
  if (edMode === 'hex') edRenderRows();
}

function renderEditorShell() {
  const c = $('ct');
  c.className = 'ct';
  const fname = edName.split('/').pop();
  const isUsb = si >= 0 && S[si] && S[si].usb;
  const textOk = edTotal <= ED_TEXT_MAX;
  let bar = '<div class="editor-bar">'
    + '<button class="ebtn" onclick="closeEditor()">\u2190 Back</button>'
    + '<button class="ebtn' + (edMode==='hex'?' eact':'') + '" onclick="edSwitchMode(\'hex\')">Hex</button>'
    + '<button class="ebtn' + (edMode==='text'?' eact':'') + '"' + (textOk ? ' onclick="edSwitchMode(\'text\')"' : ' disabled title="File too large for text mode (max 2MB)"') + '>Text</button>'
    + '<span class="ename">' + esc(fname) + '</span>'
    + '<span class="esz">' + fmtB(edTotal) + '</span>'
    + '<button class="ebtn" onclick="edZoom(-1)" style="padding:4px 8px;font-size:14px">\u2212</button>'
    + '<span style="font-size:11px;color:var(--dm);min-width:30px;text-align:center">' + edFontSize + 'px</span>'
    + '<button class="ebtn" onclick="edZoom(1)" style="padding:4px 8px;font-size:14px">+</button>';
  if (!isUsb) bar += '<button class="ebtn" style="border-color:var(--ok);color:var(--ok)" onclick="saveEditor()">Save</button>';
  bar += '</div>';

  if (edMode === 'hex') {
    const totalRows = Math.ceil(edTotal / 16);
    const totalH = totalRows * edRowH;
    c.innerHTML = bar
      + '<div class="hex-wrap" id="hexwrap" style="position:relative;font-size:' + edFontSize + 'px">'
      + '<div id="hexspacer" style="height:' + totalH + 'px;pointer-events:none"></div>'
      + '<div id="hexview" style="position:absolute;top:0;left:0;right:0"></div>'
      + '</div>';
    const wrap = $('hexwrap');
    wrap.onscroll = edOnScroll;
  } else {
    c.innerHTML = bar + '<div class="text-wrap"><pre id="texthl"></pre><textarea id="textedit" spellcheck="false" disabled>Loading...</textarea></div>';
    edLoadFullText();
  }
}

let edScrollTimer = null;
function edOnScroll() {
  if (edScrollTimer) return;
  edScrollTimer = setTimeout(() => { edScrollTimer = null; edRenderRows(); }, 16);
}

async function edRenderRows() {
  const wrap = $('hexwrap');
  const view = $('hexview');
  if (!wrap || !view) return;

  const scrollTop = wrap.scrollTop;
  const viewH = wrap.clientHeight;
  const firstRow = Math.max(0, Math.floor(scrollTop / edRowH) - 5);
  const lastRow = Math.min(Math.ceil(edTotal / 16), Math.ceil((scrollTop + viewH) / edRowH) + 5);

  /* Determine which chunks we need */
  const neededChunks = new Set();
  for (let row = firstRow; row < lastRow; row++) {
    const off = row * 16;
    const c1 = Math.floor(off / ED_CHUNK) * ED_CHUNK;
    const c2 = Math.floor((off + 15) / ED_CHUNK) * ED_CHUNK;
    neededChunks.add(c1);
    if (c2 !== c1) neededChunks.add(c2);
  }

  /* Fetch missing chunks */
  const fetches = [];
  for (const co of neededChunks) {
    if (!edCache[co] && !edPending[co]) fetches.push(edFetchChunk(co));
  }
  if (fetches.length > 0) await Promise.all(fetches);

  /* Render visible rows */
  let h = '';
  for (let row = firstRow; row < lastRow; row++) {
    const off = row * 16;
    const top = row * edRowH;
    h += '<div class="hex-row" style="position:absolute;top:' + top + 'px;height:' + edRowH + 'px;left:0;right:0">';
    h += '<span class="hex-off">' + off.toString(16).toUpperCase().padStart(8, '0') + '</span>';
    h += '<span class="hex-bytes">';
    for (let j = 0; j < 16; j++) {
      const boff = off + j;
      if (boff < edTotal) {
        const b = edGetByte(boff);
        if (b) {
          const cls = b.dirty ? ' class="dirty"' : '';
          h += '<span' + cls + ' onclick="editByte(' + boff + ')">' + b.v.toString(16).toUpperCase().padStart(2, '0') + '</span> ';
        } else {
          h += '<span style="color:var(--bd)">??</span> ';
        }
      } else {
        h += '   ';
      }
      if (j === 7) h += ' ';
    }
    h += '</span><span class="hex-sep"></span><span class="hex-ascii">';
    for (let j = 0; j < 16; j++) {
      const boff = off + j;
      if (boff >= edTotal) break;
      const b = edGetByte(boff);
      if (b) {
        const ch = (b.v >= 32 && b.v <= 126) ? String.fromCharCode(b.v) : '.';
        const cls = b.dirty ? ' class="dirty"' : '';
        h += '<span' + cls + ' onclick="editByte(' + boff + ')">' + esc(ch) + '</span>';
      } else {
        h += '<span style="color:var(--bd)">.</span>';
      }
    }
    h += '</span></div>';
  }
  view.innerHTML = h;
}

async function edLoadFullText() {
  /* Load entire file for text mode (only for small files) */
  for (let off = 0; off < edTotal; off += ED_CHUNK) {
    if (!edCache[off]) await edFetchChunk(off);
  }
  /* Merge */
  const full = new Uint8Array(edTotal);
  for (let off = 0; off < edTotal; off += ED_CHUNK) {
    const c = edCache[off];
    if (c) full.set(c.subarray(0, Math.min(c.length, edTotal - off)), off);
  }
  /* Apply edits */
  for (const [off, val] of Object.entries(edEdits)) full[parseInt(off)] = val;

  const ta = $('textedit');
  if (!ta) return;
  const dec = new TextDecoder('utf-8', {fatal: false});
  const txt = dec.decode(full);
  ta.value = txt;
  ta.disabled = false;
  ta._fullData = full;
  /* Highlight */
  const hl = $('texthl');
  if (hl) {
    hl.innerHTML = hlApply(txt);
    /* Sync scroll and re-highlight on input */
    ta.oninput = function() {
      hl.innerHTML = hlApply(this.value);
    };
    ta.onscroll = function() {
      hl.scrollTop = this.scrollTop;
      hl.scrollLeft = this.scrollLeft;
    };
  }
}

/* ── Syntax highlighting ──────────────────────────── */
function hlDetect(txt) {
  const t = txt.trimStart();
  if (t[0] === '{' || t[0] === '[') return 'json';
  if (t[0] === '<') return 'xml';
  return 'plain';
}

function hlApply(txt) {
  const lang = hlDetect(txt);
  if (lang === 'json') return hlJSON(txt);
  if (lang === 'xml') return hlXML(txt);
  return esc(txt) + '\n';
}

function hlJSON(txt) {
  /* Tokenize JSON with regex — handles keys, strings, numbers, booleans, null */
  return esc(txt).replace(
    /(&quot;)((?:[^&]|&(?!quot;))*?)(&quot;)\s*:/g,
    '<span class="hl-key">$1$2$3</span>:'
  ).replace(
    /:\s*(&quot;)((?:[^&]|&(?!quot;))*?)(&quot;)/g,
    ': <span class="hl-str">$1$2$3</span>'
  ).replace(
    /(&quot;)((?:[^&]|&(?!quot;))*?)(&quot;)/g,
    '<span class="hl-str">$1$2$3</span>'
  ).replace(
    /\b(-?\d+\.?\d*(?:[eE][+-]?\d+)?)\b/g,
    '<span class="hl-num">$1</span>'
  ).replace(
    /\b(true|false)\b/g,
    '<span class="hl-bool">$1</span>'
  ).replace(
    /\b(null)\b/g,
    '<span class="hl-null">$1</span>'
  ) + '\n';
}

function hlXML(txt) {
  return esc(txt).replace(
    /(&lt;!--)([\s\S]*?)(--&gt;)/g,
    '<span class="hl-cmt">$1$2$3</span>'
  ).replace(
    /(&lt;\/?)([\w:.-]+)/g,
    '$1<span class="hl-tag">$2</span>'
  ).replace(
    /\b([\w:.-]+)(=)(&quot;)((?:[^&]|&(?!quot;))*?)(&quot;)/g,
    '<span class="hl-attr">$1</span>$2<span class="hl-aval">$3$4$5</span>'
  ) + '\n';
}

function edSwitchMode(mode) {
  if (mode === edMode) return;
  /* If leaving text mode, capture edits */
  if (edMode === 'text') {
    const ta = $('textedit');
    if (ta && ta._fullData) {
      const enc = new TextEncoder();
      const newData = enc.encode(ta.value);
      /* Store changed bytes as edits */
      for (let i = 0; i < Math.max(newData.length, ta._fullData.length); i++) {
        const orig = i < ta._fullData.length ? ta._fullData[i] : undefined;
        const nv = i < newData.length ? newData[i] : undefined;
        if (nv !== undefined && nv !== orig) edEdits[i] = nv;
      }
      /* Update total if size changed */
      if (newData.length !== edTotal) edTotal = newData.length;
    }
  }
  edMode = mode;
  renderEditorShell();
  if (mode === 'hex') edRenderRows();
}

function editByte(off) {
  const isUsb = si >= 0 && S[si] && S[si].usb;
  if (isUsb) return;
  const b = edGetByte(off);
  if (!b) return;
  const cur = b.v.toString(16).toUpperCase().padStart(2, '0');
  const val = prompt('Edit byte at 0x' + off.toString(16).toUpperCase() + ' (hex):', cur);
  if (val === null) return;
  const parsed = parseInt(val, 16);
  if (isNaN(parsed) || parsed < 0 || parsed > 255) { log('Invalid byte value', 'err'); return; }
  edEdits[off] = parsed;
  /* Check if same as original - remove edit if unchanged */
  const cOff = Math.floor(off / ED_CHUNK) * ED_CHUNK;
  const chunk = edCache[cOff];
  if (chunk && chunk[off - cOff] === parsed) delete edEdits[off];
  edRenderRows();
}

async function saveEditor() {
  if (bsy) return;
  bsy = true;
  try {
    /* Build full file content */
    let fullData;
    if (edMode === 'text') {
      const ta = $('textedit');
      if (ta) {
        const enc = new TextEncoder();
        fullData = enc.encode(ta.value);
      }
    }
    if (!fullData) {
      /* Load all chunks + apply edits */
      for (let off = 0; off < edTotal; off += ED_CHUNK) {
        if (!edCache[off]) await edFetchChunk(off);
      }
      fullData = new Uint8Array(edTotal);
      let pos = 0;
      for (let off = 0; off < edTotal; off += ED_CHUNK) {
        const c = edCache[off];
        if (c) { fullData.set(c, off); pos = off + c.length; }
      }
      for (const [off, val] of Object.entries(edEdits)) {
        const o = parseInt(off);
        if (o < fullData.length) fullData[o] = val;
      }
    }

    /* base64 encode in chunks */
    let b64 = '';
    const bchunk = 8192;
    for (let i = 0; i < fullData.length; i += bchunk) {
      const slice = fullData.subarray(i, Math.min(i + bchunk, fullData.length));
      b64 += btoa(String.fromCharCode.apply(null, slice));
    }
    log('Saving ' + edName + ' (' + fmtB(fullData.length) + ')...');
    const r = await fetch('/api/write_file?name=' + encodeURIComponent(edName), {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: b64
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    /* Invalidate cache and reload visible area */
    edCache = {};
    edEdits = {};
    edTotal = d.size;
    log('Saved ' + edName + ' (' + d.size + ' bytes)', 'ok');
    if (edMode === 'hex') {
      await edFetchChunk(0);
      edRenderRows();
    } else {
      await edLoadFullText();
    }
  } catch(e) { log('Save failed: ' + e.message, 'err'); }
  bsy = false;
}

function closeEditor() {
  if (Object.keys(edEdits).length > 0) {
    if (!confirm('You have unsaved changes. Discard?')) return;
  }
  edName = ''; edTotal = 0; edCache = {}; edEdits = {}; edPending = {};
  renderF();
}

/* ── Confirm replace modal ─────────────────────────── */
function confirmReplace(name) {
  return new Promise(res => {
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML =
      '<div class="modal"><h3>File already exists</h3>'
      + '<p><b>' + esc(name) + '</b> already exists in this save. Replace it?</p>'
      + '<div class="btns">'
      + '<button class="mbtn-s" id="mskip">Skip</button>'
      + '<button class="mbtn-r" id="mrep">Replace</button>'
      + '</div></div>';
    document.body.appendChild(bg);
    $("mrep").onclick = () => { bg.remove(); res(true) };
    $("mskip").onclick = () => { bg.remove(); res(false) };
  });
}

/* ── Handle file drop in browse mode ───────────────── */
async function handleBrw(files) {
  if (bsy || !mt || tab !== 'browse') return;
  bsy = true;
  try {
    for (let j = 0; j < files.length; j++) {
      const file = files[j];
      if (file.name.endsWith('.zip')) {
        log('Extracting ' + file.name + ' (' + fmtB(file.size) + ')...');
        const r = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/octet-stream' },
          body: file
        });
        const d = await r.json();
        log('Extracted ' + d.files + ' files', 'ok');
      } else {
        const ck = await fetch('/api/file_exists?name=' + encodeURIComponent(file.name));
        const ce = await ck.json();
        if (ce.exists) {
          const ok = await confirmReplace(file.name);
          if (!ok) { log('Skipped ' + file.name); continue }
        }
        log('Uploading ' + file.name + ' (' + fmtB(file.size) + ')...');
        const r = await fetch('/api/upload_file?name=' + encodeURIComponent(file.name), {
          method: 'POST',
          headers: { 'Content-Type': 'application/octet-stream' },
          body: file
        });
        const d = await r.json();
        if (d.ok) log('Added ' + file.name, 'ok');
        else log(d.error, 'err');
      }
    }
    const r2 = await fetch('/api/files');
    const d2 = await r2.json();
    cf = d2.files || [];
    ex = new Set();
    /* folders start collapsed */
    renderF();
  } catch (e) {
    log('Error: ' + e.message, 'err');
  }
  bsy = false;
}

/* ── Download encrypted binary ─────────────────────── */
async function dlBin() {
  if (bsy || si < 0) return;
  bsy = true; renderTB();

/* ── Dump to USB with progress ─────────────────────── */
async function dumpUsb() {
  if (bsy || si < 0) return;
  /* Detect connected USB drives */
  try {
    const ul = await fetch('/api/usb_list');
    const ud = await ul.json();
    if (!ud.usb || ud.usb.length === 0) { log('No USB drive detected', 'err'); return; }
    if (ud.usb.length === 1) {
      dumpUsbTo(ud.usb[0]);
    } else {
      /* Show USB selector */
      closeCtxMenu();
      const m = document.createElement('div');
      m.className = 'ctx-menu'; m.id = 'ctxmenu';
      m.innerHTML = '<div style="padding:4px 10px;font-size:10px;color:var(--dm);font-weight:600">Select USB</div>'
        + ud.usb.map(u => '<div onclick="closeCtxMenu();dumpUsbTo(' + u + ')">USB ' + u + ' (usb' + u + ')</div>').join('');
      m.style.left = '50%'; m.style.top = '50%';
      m.style.transform = 'translate(-50%,-50%)'; m.style.position = 'fixed';
      document.body.appendChild(m);
    }
  } catch (e) { log('Error detecting USB: ' + e.message, 'err'); }
}

async function dumpUsbTo(usbNum) {
  if (bsy || si < 0) return;
  bsy = true; renderTB();
  const s = S[si];
  try {
    log('Mounting & dumping decrypted ' + s.title_id + '/' + s.save_name + ' to USB ' + usbNum + '...');
    const r = await fetch('/api/dump_usb?idx=' + si + '&usb=' + usbNum);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    log('Dumped decrypted save to ' + d.path, 'ok');
    mt = null; cf = []; renderTB(); renderF();
  } catch (e) {
    log('Error: ' + e.message, 'err');
  }
  bsy = false; renderTB();
}

/* ── Import USB save to system ─────────────────────── */
async function importUsb() {
  if (bsy || si < 0) return;
  const s = S[si];
  /* Check if a system save with same title_id and save_name exists */
  const exists = S.some((x, i) => i !== si && !x.usb && x.title_id === s.title_id && x.save_name === s.save_name);
  if (exists) {
    const ok = await showConfirmModal('This will overwrite an existing save. Are you sure?');
    if (!ok) return;
  }
  bsy = true; renderTB();
  try {
    log('Importing ' + s.title_id + '/' + s.save_name + ' to system...');
    const r = await fetch('/api/import_usb_save?idx=' + si + '&uid=' + encodeURIComponent(curUid));
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    log('Imported ' + d.title_id + '/' + d.dir_name, 'ok');
    await load();
    renderL();
  } catch (e) {
    log('Error: ' + e.message, 'err');
  }
  bsy = false; renderTB();
}

/* ── Unmount ───────────────────────────────────────── */
async function um() {
  if (bsy) return;
  bsy = true; renderTB();
  try {
    log('Unmounting...');
    await fetch('/api/unmount'); mt = false;
    si = -1; renderL(); renderTB(); renderCt();
    log('Unmounted', 'ok');
  } catch (e) {
    log('Error: ' + e.message, 'err');
  }
  bsy = false;
}

/* ── Download helper ───────────────────────────────── */
function dl(b, n) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = n;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove() }, 1e3);
}

/* ── Shutdown ──────────────────────────────────────── */
async function shutdown() {
  if (!confirm('Kill GarlicMgr?')) return;
  log('Killing GarlicMgr...');
  try { await fetch('/api/shutdown') } catch (e) {}
  log('GarlicMgr killed', 'ok');
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML =
    '<div class="modal" style="text-align:center">'
    + '<h3 style="font-size:18px;margin-bottom:16px">Thank you for using<br>Garlic SaveMgr!</h3>'
    + '<p style="color:var(--dm);margin-bottom:12px">by earthonion</p>'
    + '<iframe src="https://github.com/sponsors/earthonion/button" title="Sponsor earthonion" height="32" width="114" style="border:0;border-radius:6px"></iframe>'
    + '</div>';
  document.body.appendChild(bg);
}

/* ── Init ──────────────────────────────────────────── */
if (window.innerWidth <= 768) $('drawer').classList.add('collapsed');
else drawerOpen = true;
updateDrawer();
loadUsers().then(() => load());
renderCt();
renderTB();
</script>
